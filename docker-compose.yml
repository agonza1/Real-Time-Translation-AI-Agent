services:
  translation-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: real-time-translation-ai-agent
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      USE_LOCAL_WEBHOOK: "true"
      LOG_LEVEL: INFO
      LOG_FORMAT: pretty
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: real-time-translation-ai-agent-ngrok
    depends_on:
      - translation-agent
    command: ["http", "translation-agent:3000"]
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    restart: unless-stopped
